<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pragati-Archive</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="dashboard">

    <!-- ISTQB START-->
    <div class="section runner-card" style="cursor:pointer;" onclick="openISTQB()">
      <div class="runner-header">
        <h2>ISTQB</h2>
        <div class="runner-stat">
          <span class="streak-trophy">&#128187;</span>
          <span class="streak-number">3</span>
          <span class="streak-label">days left</span>
        </div>
      </div>
      <p>Started: Sept 6, 2025 | Deadline: April 11, 2026

      </p>
    </div>
    <!-- ISTQB END -->
    <!-- FLUTE -->
    <div class="section runner-card" style="cursor:pointer;" onclick="openFlute()">
      <div class="runner-header">
        <h2>Flute :)</h2>
        <div class="runner-stat">
          <span class="streak-trophy">&#129672;</span>

          <span class="streak-number">5</span>

          <span class="streak-label">/41</span>
        </div>
      </div>
      <p>Always had a desire to play :)
      </p>
    </div>


  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>

</html>
