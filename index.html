<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pragati</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="dashboard">

    <!-- RUNNER -->
    <div class="section runner-card" style="cursor:pointer;" onclick="openRunner()">
      <div class="runner-header">
        <h2 style="display:flex;align-items:center;gap:0.5em;">Runner
        </h2>
        <div class="streak">
          <span class="streak-trophy">&#127939;</span>
          <span class="streak-number" id="runCount">R</span>
          <span class="streak-label" id="runMonCount">July</span>
        </div>
      </div>

      <p id="daysRun">July - 

      </p>
    </div>

    <!-- EXERCISE -->
    <div class="section runner-card" style="cursor:pointer;" onclick="openExercise()">
      <div class="runner-header">
        <h2>Exercise</h2>
        <div class="runner-stat">
          <span class="streak-trophy">&#127947;</span>
          <span class="streak-number" id="xerCount">X</span>
          <span class="streak-label">July</span>
        </div>
      </div>

      <p id="daysXer">Upper/Light - 7</p>

    </div>

    <!-- BOOKS -->
    <div class="section runner-card" style="cursor:pointer;" onclick="openBooks()">
      <div class="runner-header">
        <h2>Books</h2>
        <div class="runner-stat">
          <span class="streak-trophy">&#127911;</span>

          <span class="streak-number">15</span>

        </div>
      </div>
      <p>The Guide - June 19</p>
    </div>

    <!-- ASHTAVAKRA -->
    <div class="section runner-card" style="cursor:pointer;" onclick="openAshtaVakr()">
      <div class="runner-header">
        <h2>AshtaVakr</h2>
        <div class="runner-stat">
          <span class="streak-trophy">&#2384;</span>
          <span class="streak-number">32</span>
          <span class="streak-label">/90</span>
        </div>
      </div>

      <p>00:30:00 A seeker journey to becoming Drishta</p>

    </div>


    

    <!-- WHITEBOARD -->
    <div class="section runner-card" style="cursor:pointer;" onclick="openWhiteboard()">
      <div class="runner-header">
        <h2>TLDRAW</h2>
        <div class="runner-stat">
          <span class="streak-trophy">📋</span>

          <!-- <span class="streak-number">1</span> -->

        </div>
      </div>
      <!-- <p>Last Completed Journey: April 10, 2026: ISTQB</p> -->
    </div>

    <!-- FULFILMENT -->
    <div class="section runner-card" style="cursor:pointer;" onclick="openFulfilments()">
      <div class="runner-header">
        <h2>Archive</h2>
        <div class="runner-stat">
          <span class="streak-trophy">&#127942;</span>

          <span class="streak-number">1</span>

        </div>
      </div>
      <p>Last Completed Journey: April 10, 2026: ISTQB</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
